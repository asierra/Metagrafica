# Resaltado de sintaxis MetaGráfica (V3) para Geany.
#
# Instalación:
#   cp filetypes.MG.conf ~/.config/geany/filedefs/
#   y en ~/.config/geany/filetype_extensions.conf, bajo [Extensions]:
#       MG=*.mg;
#   Reiniciar Geany.  Aparece como "MG" en Documento → Definir tipo de fichero.
#
# Se apoya en el lexer de Erlang: es el único de Geany que combina comentarios
# con '%' (como MG, §1) con DOS listas de palabras clave.  Ver README.md.

[styling]
# Editar los colores en el .conf del esquema de color, no aquí.
default=default
comment=comment
comment_function=comment
comment_module=comment
comment_doc=comment
comment_doc_macro=comment
number=number_1
string=string_1
operator=operator
character=character

# keyword_1: control de flujo, declaraciones, configuración y estado (§5-§7)
keyword=keyword_1
# keyword_2: primitivas, generadores, placements, álgebra de paths y funciones
bifs=keyword_2

# Un identificador que empieza con mayúscula lo marca el lexer como "variable".
# En MG el convenio del corpus es que las structs van Capitalizadas (Nivel,
# PanelCurvas), así que se colorean como tipo.  Las que van en minúscula
# (lib/pseudo3d.mg: plano, prisma) caen en default; es cosmético.
variable=type

atom=default
function_name=function
macro=preprocessor
record=type
preproc=preprocessor
node_name=default
atom_quoted=default
macro_quoted=default
record_quoted=default
node_name_quoted=default
modules=default
modules_att=preprocessor
unknown=default

[keywords]
# Cada lista debe ir en UNA sola línea.

# Control de flujo (§6), declaraciones (§8, §9), inclusión (§15),
# configuración del documento (§3) y sentencias de estado (§7.3, §11.1).
keywords=struct for to step if else and or not include path display_size world_window transform translate rotate scale shear color fill outlinefill hatch hatch_gap line_width dash font font_size align valign marker_size stretch true false

# Primitivas (§4), generadores y ejes (§13), placements (§10, §17),
# álgebra de paths (§9) y funciones escalares (§5.2).
bifs=polyline polygon circle rectangle arc ellipse bezier dot marker polybar text sine compound ticks numbers axis grid plot xaxis yaxis legend entry place fit repeat transpose flip_x flip_y reverse concat smooth path_width path_x_min_at_y path_x_max_at_y path_x_bounds_at_y sin cos tan atan2 sqrt abs mod exp ln str len gray pi

# Sin usar por MG (el lexer de Erlang las exige declaradas).
preproc=
module=
doc=

[settings]
# OBLIGATORIO en un filetype personalizado: Geany no sabe compilar un lexer
# propio, así que hay que decirle cuál prestar.  De ahí salen los nombres de
# las claves de [styling] y de [keywords].
lexer_filetype=Erlang

extension=mg
mime_type=text/x-metagrafica

# Comentario de línea al estilo TeX (§1).  Esto es para Ctrl+D; el color lo
# pone el lexer, que ya trata '%' como comentario.
comment_single=%
comment_use_indent=true

# MG no tiene delimitadores de bloque plegables propios más allá de las llaves.
[indentation]
width=2
type=0

[build_settings]
# %f = fichero actual, %e = fichero sin extensión
compiler=mg "%f"
run_cmd=mg "%f" "%e.svg"
